<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockchain Quiz</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: rgba(19, 28, 39, 0.94);
      --panel-soft: rgba(24, 35, 49, 0.92);
      --card: #152130;
      --text: #eef4fb;
      --muted: #98a7ba;
      --accent: #4dd1b5;
      --accent-2: #ffd166;
      --line: rgba(173, 193, 214, 0.16);
      --good: #7df0bc;
      --bad: #ff9a94;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(77, 209, 181, 0.2), transparent 24%),
        radial-gradient(circle at 88% 10%, rgba(255, 209, 102, 0.18), transparent 18%),
        linear-gradient(180deg, #0d141c 0%, #091018 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1040px, calc(100% - 28px));
      margin: 22px auto 36px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 22px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 2.8vw, 2.6rem);
      line-height: 1.04;
      font-family: Georgia, "Times New Roman", serif;
    }

    .subtext, .note {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .stat-value {
      font-size: 1.45rem;
      font-weight: 800;
    }

    .workspace {
      padding: 18px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tabs, .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button.active {
      background: linear-gradient(135deg, rgba(77, 209, 181, 0.9), rgba(49, 146, 204, 0.9));
      color: #07131a;
      border-color: transparent;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      min-height: 320px;
    }

    .question-badges {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .question-text {
      margin: 0 0 18px;
      font-size: 1.1rem;
      line-height: 1.5;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 15px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
    }

    .option input {
      margin-top: 3px;
      transform: scale(1.1);
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(7, 13, 20, 0.72);
      color: var(--text);
      padding: 14px 15px;
      font: inherit;
    }

    textarea:focus {
      outline: 2px solid rgba(77, 209, 181, 0.26);
      border-color: rgba(77, 209, 181, 0.6);
    }

    .feedback {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px dashed rgba(173, 193, 214, 0.2);
      display: none;
    }

    .feedback.show { display: block; }
    .feedback-status {
      font-weight: 800;
      margin-bottom: 6px;
    }
    .feedback-status.good { color: var(--good); }
    .feedback-status.bad { color: var(--bad); }
    .feedback-answer {
      color: #d9e2ef;
      line-height: 1.5;
    }

    .footer-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    @media (max-width: 860px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar, .meta, .footer-actions { flex-direction: column; align-items: stretch; }
      .tabs button, .actions button { width: 100%; }
    }

    @media (max-width: 560px) {
      .stats { grid-template-columns: 1fr; }
      .shell { width: min(100%, calc(100% - 16px)); }
    }
  </style>
</head>

        </div>
      </div>
    </section>
  </div>

      "Explain the process of ensuring data integrity when modifying transactions": {
        type: "text",
        answer: "Update all hash references in sequence."
      },
      "Which concept s described here: \"The communication between individuals in which the question arises 8 under which circumstances signals can be honest or dishonest. The candidate has to do something Bo expensive and difficult, such as robbing a store or getting a gang symbol tattooed. Then she or he is c considered trustworthy": {
        type: "text",
        answer: "Costly signaling"
      },
      "Explain the concept of consensus in a blockchain": {
        type: "text",
        answer: "Agreement among network participants on the validity of transactions."
      },
      "What is the main drawback of Proof of Work (PoW) consensus mechanism?": {
        type: "text",
        answer: "High energy consumption and computational intensity."
      },
      "Who decides which branch of a blockchain to expand when there's a fork?": {
        type: "text",
        answer: "The actor who first solves the puzzle of a new block."
      },
      "What is a smart contract? Give a brief definition": {
        type: "text",
        answer: "A smart contract is a computer protocol that determines interactions between actors on a blockchain."
      },
      "What distinguishes public and private blockchains?": {
        type: "text",
        answer: "Access permissions and consensus mechanisms."
      },
      "What kind of instrument is mentioned here to store the money handled by the microtransaction?": {
        type: "text",
        answer: "Digital wallet"
      },
      "How can blockchain technology enhance transparency and efficiency in supply chains?": {
        type: "text",
        answer: "By securely and transparently tracking supply chain data among stakeholders."
      }
    };

    function cleanPrompt(value) {
      return String(value || "")
        .replace(/[©®]/g, "")
        .replace(/\s+/g, " ")
        .replace(/\s+\?/g, "?")
        .trim()
        .replace(/\.$/, "");
    }

    function cleanAnswer(value) {
      return String(value || "")
        .replace(/You got.*$/i, "")
        .replace(/[©®]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[“”]/g, "\"")
        .replace(/[‘’]/g, "'")
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildQuestions() {
      let index = 0;
      return rawSections.flatMap(section =>
        section.questions.map(question => {
          const prompt = cleanPrompt(question.prompt);
          const override = overrides[prompt] || null;
          const fallbackAnswer = cleanAnswer(question.answer);
          const type = override?.type || "text";
          index += 1;
          return {
            id: `q-${index}`,
            section: section.title,
            code: section.code,
            number: question.number,
            prompt,
            type,
            points: question.points || 1,
            answer: override?.answer || fallbackAnswer,
            options: override?.options || [],
            correct: override?.correct || [],
            rawAnswer: fallbackAnswer
          };
        })
      );
    }

    const allQuestions = buildQuestions();
    const state = Object.fromEntries(allQuestions.map(q => [q.id, { checked: false, correct: false, text: "", selected: [] }]));

    let filter = "all";
    let currentIndex = 0;

    const questionHost = document.getElementById("questionHost");
    const totalCount = document.getElementById("totalCount");
    const answeredCount = document.getElementById("answeredCount");
    const correctCount = document.getElementById("correctCount");
    const modeCount = document.getElementById("modeCount");
    const positionText = document.getElementById("positionText");
    const sectionText = document.getElementById("sectionText");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const checkBtn = document.getElementById("checkBtn");
    const retryBtn = document.getElementById("retryBtn");
    const resetBtn = document.getElementById("resetBtn");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    function getVisibleQuestions() {
      if (filter === "mcq") return allQuestions.filter(q => q.type === "single" || q.type === "multi");
      if (filter === "text") return allQuestions.filter(q => q.type === "text");
      return allQuestions;
    }

    function currentQuestions() {
      const questions = getVisibleQuestions();
      if (currentIndex >= questions.length) currentIndex = Math.max(questions.length - 1, 0);
      return questions;
    }

    function updateStats() {
      const visible = getVisibleQuestions();
      const answered = visible.filter(q => state[q.id].checked).length;
      const correct = visible.filter(q => state[q.id].checked && state[q.id].correct).length;
      totalCount.textContent = String(visible.length);
      answeredCount.textContent = String(answered);
      correctCount.textContent = String(correct);
      modeCount.textContent = filter === "all" ? "All" : filter === "mcq" ? "MCQ" : "Fill";

      if (!visible.length) {
        positionText.textContent = "Question 0 of 0";
        sectionText.textContent = "No questions";
        return;
      }

      const current = visible[currentIndex];
      positionText.textContent = `Question ${currentIndex + 1} of ${visible.length}`;
      sectionText.textContent = `${current.code} ${current.section}`;
    }

    function arraysEqual(a, b) {
      return a.length === b.length && a.every((value, i) => value === b[i]);
    }

    function checkTextAnswer(question, value) {
      const typed = normalizeText(value);
      const expected = normalizeText(question.answer);
      if (!typed) return false;
      if (typed === expected) return true;
      return expected.includes(typed) || typed.includes(expected);
    }

    function renderQuestion() {
      const visible = currentQuestions();
      updateStats();

      if (!visible.length) {
        questionHost.innerHTML = "<p class=\"question-text\">No questions available in this filter.</p>";
        return;
      }

      const question = visible[currentIndex];
      const entry = state[question.id];
      const kindLabel = question.type === "text" ? "Fill In The Blank" : question.type === "multi" ? "Multiple Select" : "Single Choice";

      let body = `
        <div class="question-badges">
          <span class="badge">${question.code} ${question.number}</span>
          <span class="badge">${kindLabel}</span>
        </div>
        <p class="question-text">${question.prompt}</p>
      `;

      if (question.type === "text") {
        body += `<textarea id="textAnswer" placeholder="Type your answer here...">${entry.text || ""}</textarea>`;
      } else {
        const inputType = question.type === "multi" ? "checkbox" : "radio";
        body += `<div class="options">` + question.options.map((option, idx) => `
          <label class="option">
            <input type="${inputType}" name="mcq" value="${idx}" ${entry.selected.includes(idx) ? "checked" : ""} />
            <span>${option}</span>
          </label>
        `).join("") + `</div>`;
      }

      body += `
        <div class="feedback ${entry.checked ? "show" : ""}" id="feedback">
          <div class="feedback-status ${entry.correct ? "good" : "bad"}">${entry.checked ? (entry.correct ? "Correct" : "Not quite") : ""}</div>
          <div class="feedback-answer">${entry.checked ? `Answer: ${question.answer}` : ""}</div>
        </div>
      `;

      questionHost.innerHTML = body;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.textContent = currentIndex === visible.length - 1 ? "Finish" : "Next";
      retryBtn.disabled = !entry.checked;
      checkBtn.disabled = entry.checked;
    }

    function saveDraft() {
      const visible = currentQuestions();
      if (!visible.length) return;
      const question = visible[currentIndex];
      const entry = state[question.id];

      if (question.type === "text") {
        const box = document.getElementById("textAnswer");
        if (box) entry.text = box.value;
        return;
      }

      entry.selected = Array.from(questionHost.querySelectorAll("input[name='mcq']:checked")).map(input => Number(input.value)).sort((a, b) => a - b);
    }

    function checkCurrent() {
      const visible = currentQuestions();
      if (!visible.length) return;
      saveDraft();
      const question = visible[currentIndex];
      const entry = state[question.id];

      if (question.type === "text") {
        if (!entry.text.trim()) return;
        entry.correct = checkTextAnswer(question, entry.text);
      } else {
        if (!entry.selected.length) return;
        entry.correct = arraysEqual(entry.selected, [...question.correct].sort((a, b) => a - b));
      }

      entry.checked = true;
      renderQuestion();
    }

    function retryCurrent() {
      const visible = currentQuestions();
      if (!visible.length) return;
      const question = visible[currentIndex];
      state[question.id] = { checked: false, correct: false, text: "", selected: [] };
      renderQuestion();
    }

    function move(step) {
      saveDraft();
      const visible = currentQuestions();
      if (!visible.length) return;
      currentIndex = Math.min(Math.max(currentIndex + step, 0), visible.length - 1);
      renderQuestion();
    }

    function setFilter(nextFilter) {
      saveDraft();
      filter = nextFilter;
      currentIndex = 0;
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.filter === nextFilter));
      renderQuestion();
    }

    function resetQuiz() {
      allQuestions.forEach(q => {
        state[q.id] = { checked: false, correct: false, text: "", selected: [] };
      });
      currentIndex = 0;
      filter = "all";
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.filter === "all"));
      renderQuestion();
    }

    checkBtn.addEventListener("click", checkCurrent);
    retryBtn.addEventListener("click", retryCurrent);
    prevBtn.addEventListener("click", () => move(-1));
    nextBtn.addEventListener("click", () => move(1));
    resetBtn.addEventListener("click", resetQuiz);
    tabs.forEach(tab => tab.addEventListener("click", () => setFilter(tab.dataset.filter)));

    renderQuestion();
  </script>
</body>
</html>
